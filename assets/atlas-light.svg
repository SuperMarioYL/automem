<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif"
     role="img" aria-label="Architecture: agent CLI hooks call automem recall and capture against an append-only JSONL store; recall injects top-K memories back into the session">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- ===== static connector base lines ===== -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <!-- Stop hook: agent -> capture -->
    <line x1="230" y1="162" x2="330" y2="122" marker-end="url(#ah-l)"/>
    <!-- capture -> store (append) -->
    <line x1="500" y1="118" x2="650" y2="140" marker-end="url(#ah-l)"/>
    <!-- SessionStart hook: agent -> recall -->
    <line x1="230" y1="242" x2="330" y2="242" marker-end="url(#ah-l)"/>
    <!-- store -> recall (read) -->
    <line x1="650" y1="220" x2="500" y2="242" marker-end="url(#ah-l)"/>
    <!-- recall -> inject back into agent -->
    <line x1="330" y1="262" x2="230" y2="262" marker-end="url(#ah-l)"/>
  </g>

  <!-- ===== marching-dash data flow (direction = data direction) ===== -->
  <g stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="230" y1="162" x2="326" y2="124" stroke="#5E5CE6" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="118" x2="646" y2="139" stroke="#5E5CE6" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="220" x2="504" y2="241" stroke="#10A37F" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="330" y1="242" x2="234" y2="242" stroke="#10A37F" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="330" y1="262" x2="234" y2="262" stroke="#10A37F" stroke-opacity="0.5" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.6s" begin="-1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ===== data packet dots ===== -->
  <g>
    <circle r="3" fill="#5E5CE6">
      <animateMotion path="M230,162 L326,124" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#5E5CE6">
      <animateMotion path="M500,118 L646,139" dur="2.4s" begin="-1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#10A37F">
      <animateMotion path="M650,220 L504,241" dur="2.4s" begin="-0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#10A37F">
      <animateMotion path="M330,242 L234,242" dur="2.4s" begin="-1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===== nodes ===== -->
  <!-- Agent CLI (purple = agent/logic) -->
  <g>
    <rect x="40" y="150" width="190" height="120" rx="16" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="135" y="196" text-anchor="middle" font-size="16" font-weight="600" fill="#4B3FC4">Agent CLI</text>
    <text x="135" y="219" text-anchor="middle" font-size="12" font-weight="500" fill="#6E6E73">Claude Code · Aider</text>
    <text x="135" y="243" text-anchor="middle" font-size="11" font-weight="500" fill="#8A8A90">Stop hook ↑ · SessionStart ↓</text>
  </g>

  <!-- automem (purple, the transient binary) -->
  <g>
    <rect x="330" y="72" width="170" height="92" rx="16" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s" begin="-1.1s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="415" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#4B3FC4">automem capture</text>
    <text x="415" y="128" text-anchor="middle" font-size="11.5" font-weight="500" fill="#6E6E73">extractive summary</text>
    <text x="415" y="147" text-anchor="middle" font-size="11" font-weight="500" fill="#8A8A90">no key · no network</text>

    <rect x="330" y="196" width="170" height="92" rx="16" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s" begin="-2.0s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="415" y="230" text-anchor="middle" font-size="15" font-weight="600" fill="#0B6B53">automem recall</text>
    <text x="415" y="252" text-anchor="middle" font-size="11.5" font-weight="500" fill="#6E6E73">lexical × recency</text>
    <text x="415" y="271" text-anchor="middle" font-size="11" font-weight="500" fill="#8A8A90">top-K → inject</text>
  </g>

  <!-- store.jsonl (blue = infrastructure/store) -->
  <g>
    <rect x="650" y="134" width="190" height="92" rx="16" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5">
      <animate attributeName="fill-opacity" values="0.10;0.18;0.10" keyTimes="0;0.5;1" dur="3.2s" begin="-2.6s"
               calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </rect>
    <text x="745" y="170" text-anchor="middle" font-size="15" font-weight="600" fill="#0A4F9E">~/.automem/store.jsonl</text>
    <text x="745" y="192" text-anchor="middle" font-size="11.5" font-weight="500" fill="#6E6E73">append-only · one line/record</text>
    <text x="745" y="211" text-anchor="middle" font-size="11" font-weight="500" fill="#8A8A90">no index · no daemon</text>
  </g>

  <!-- caption -->
  <text x="440" y="330" text-anchor="middle" font-size="12" font-weight="500" fill="#8A8A90">Stop → capture appends · SessionStart → recall injects top-K back into the session</text>
</svg>
