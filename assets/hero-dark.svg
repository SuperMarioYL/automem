<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif"
     role="img" aria-label="automem — the offline memory layer so your coding agent remembers across restarts">
  <defs>
    <!-- title gradient sweep: window translates left→right, seamless (both ends fully outside the text bbox) -->
    <linearGradient id="hg" x1="-220%" y1="0%" x2="-100%" y2="0%">
      <stop offset="0%"   stop-color="#8985FF"/>
      <stop offset="50%"  stop-color="#2DC79A"/>
      <stop offset="100%" stop-color="#8985FF"/>
      <animate attributeName="x1" values="-220%;100%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-100%;220%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="300" fill="#1D1D1F"/>
  <text x="440" y="146" text-anchor="middle" font-size="82" font-weight="700" letter-spacing="-1" fill="url(#hg)">automem</text>
  <!-- tagline: one-shot fade-in + rise (decorative only) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.8s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="0.4s" dur="0.8s" fill="freeze"/>
    <text x="440" y="192" text-anchor="middle" font-size="18" font-weight="500" fill="#A1A1A8">the offline memory layer so your coding agent remembers across restarts</text>
    <text x="440" y="217" text-anchor="middle" font-size="13.5" font-weight="500" fill="#83838A">one binary · no vector DB · no account · no key</text>
  </g>
  <!-- domain pulse dot (decorative, infinite) -->
  <circle cx="440" cy="248" r="3" fill="#8985FF">
    <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.5;1" dur="2.4s"
             calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </circle>
</svg>
