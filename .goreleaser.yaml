version: 2

project_name: automem

before:
  hooks:
    - go mod tidy

builds:
  - id: automem
    main: ./cmd/automem
    binary: automem
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    # macOS + Linux only — Windows is out of scope for v0.1 (see README roadmap).
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: automem
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
